name: release-stubs

# Publish the PEP 561 type-stubs package on tag pushes (matches the main wheel
# release in CI.yml). Stubs version-bumps independently — bump
# `litgraph-stubs/setup.py` before tagging if the public API changed.

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publishing

jobs:
  publish:
    name: publish litgraph-stubs to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build stubs sdist + wheel
        run: |
          python -m pip install --upgrade build
          cd litgraph-stubs
          python -m build

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: litgraph-stubs/dist
