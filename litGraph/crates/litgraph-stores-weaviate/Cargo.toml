[package]
name = "litgraph-stores-weaviate"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Weaviate VectorStore for litGraph via the v1 REST API. Pure reqwest — no gRPC/proto deps."

[dependencies]
litgraph-core.workspace = true
litgraph-retrieval.workspace = true
async-trait.workspace = true
tokio = { workspace = true }
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "test-util", "net", "io-util"] }
