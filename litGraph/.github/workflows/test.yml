name: test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo:
    name: cargo test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Setup Python (for PyO3)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true   # style nits shouldn't block tests during early dev

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true

      - name: cargo build --workspace
        run: cargo build --workspace --all-targets

      - name: cargo test --workspace
        env:
          # Skip provider/db tests that require external services in CI.
          # (None today — but leaving the hook for future "live" tests.)
          RUST_LOG: warn
        run: cargo test --workspace -- --include-ignored

  python:
    name: python E2E (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: pip install maturin

      - name: Build & install litgraph wheel
        run: maturin develop --release

      - name: Run python tests
        run: |
          for f in python_tests/test_*.py; do
            echo "::group::$f"
            python "$f"
            echo "::endgroup::"
          done

  bench-smoke:
    name: bench compile (smoke)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: Swatinem/rust-cache@v2

      - name: cargo bench --no-run (compile only)
        run: cargo bench -p litgraph-bench --no-run
